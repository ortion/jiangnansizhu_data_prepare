<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简谱标注器 - 江南丝竹</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <span class="title">简谱标注器</span>
      <div class="toolbar-row">
        <div class="input-group">
          <input type="text" id="csv-path" placeholder="选择CSV文件..." readonly />
          <button id="btn-browse">浏览...</button>
        </div>
        <div class="input-group narrow">
          <label>行号</label>
          <input type="number" id="line-number" value="1" min="1" />
        </div>
        <button id="btn-load-line">加载行</button>
        <div class="input-group narrow">
          <label>小节线(拍)</label>
          <input type="number" id="beats-per-measure" value="4" min="1" max="16" />
        </div>
        <div class="spacer"></div>
        <button id="btn-import">导入JSON</button>
        <button id="btn-export">导出JSON</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Canvas Area -->
      <div class="canvas-area">
        <div class="canvas-scroll" id="canvas-scroll">
          <canvas id="jianpu-canvas"></canvas>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="panel shortcuts-panel">
          <div class="panel-title">快捷键</div>
          <div class="shortcut-item">B - 切换板 (0↔1)</div>
          <div class="shortcut-item">Y - 切换眼 (0↔1)</div>
          <div class="shortcut-item">G - 切换骨干音 (0↔1)</div>
          <div class="shortcut-item">← → - 左右选择音符</div>
          <div class="shortcut-item">点击音符也可选中</div>
        </div>

        <div class="panel info-panel">
          <div class="panel-title">当前选中</div>
          <div id="selected-info">无选中音符</div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="status-text">就绪</span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
